<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nouveau mot de passe — VyraShop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060412;--card:#0d0b1f;--pu:#7c3aed;--pu-light:#8b5cf6;--pl:#c4b5fd;--cy:#22d3ee;--cy-light:#67e8f9;--or:#f97316;--gr:#34d399;--red:#f87171;--tx:#8b7cb4;--tx-bright:#cdc3ea;--wh:#fff;--bord:rgba(139,92,246,.09);--bord-mid:rgba(139,92,246,.22);--r:14px;--r-xl:28px;--r-pill:9999px}
body{background:radial-gradient(ellipse 700px 500px at 20% -10%,rgba(124,58,237,.12),transparent 60%),radial-gradient(ellipse 400px 400px at 85% 80%,rgba(34,211,238,.06),transparent 55%),var(--bg);color:var(--wh);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.logo{font-size:1.4rem;font-weight:900;margin-bottom:36px;text-decoration:none}
.logo-vyra{background:linear-gradient(100deg,#c4b5fd 0%,#8b5cf6 40%,#22d3ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card{background:var(--card);border:1px solid transparent;background-clip:padding-box;outline:1px solid rgba(139,92,246,.2);border-radius:var(--r-xl);padding:38px 32px;width:100%;max-width:430px;box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 80px rgba(124,58,237,.07)}
.card h2{font-size:1.2rem;font-weight:900;margin-bottom:8px;letter-spacing:-.01em}
.card p.intro{color:var(--tx-bright);font-size:.86rem;margin-bottom:28px;line-height:1.65}
label{display:block;font-size:.79rem;font-weight:700;color:var(--cy-light);margin-bottom:7px;letter-spacing:.02em;text-transform:uppercase}
input[type="password"]{width:100%;padding:14px 18px;border-radius:var(--r);border:1.5px solid var(--bord);background:rgba(255,255,255,.04);color:var(--wh);font-size:.95rem;font-family:'Inter',inherit;margin-bottom:18px;outline:none;transition:border-color .2s,box-shadow .2s}
input[type="password"]:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
input[type="password"]::placeholder{color:var(--tx);opacity:.5}
.btn{width:100%;background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff;border:none;padding:15px;border-radius:var(--r-pill);font-size:1rem;font-weight:800;cursor:pointer;font-family:'Inter',inherit;margin-top:4px;transition:all .22s;box-shadow:0 4px 18px rgba(124,58,237,.35)}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(124,58,237,.5)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sec{display:block;width:100%;text-align:center;background:rgba(255,255,255,.04);color:var(--tx-bright);border:1px solid var(--bord);padding:14px;border-radius:var(--r-pill);font-size:.92rem;font-weight:700;text-decoration:none;margin-top:12px;transition:all .2s}
.btn-sec:hover{border-color:rgba(34,211,238,.3);color:var(--cy-light)}
.msg{font-size:.83rem;padding:12px 16px;border-radius:var(--r);margin-top:16px;display:none;line-height:1.5}
.msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.msg.success{background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.3);color:var(--gr)}
.back{display:block;text-align:center;margin-top:24px;color:var(--tx);font-size:.8rem;text-decoration:none;transition:color .2s}
.back:hover{color:var(--wh)}
@media(max-width:480px){.card{padding:28px 22px}}
</style>
</head>
<body>
<a href="/" class="logo"><span class="logo-vyra">VyraShop</span></a>
<div class="card">
  <div id="form-step">
    <h2>Choisis un nouveau mot de passe</h2>
    <p class="intro">Ce lien provient de l'email de réinitialisation que tu viens de recevoir.</p>
    <div><label>Nouveau mot de passe</label><input type="password" id="new-pwd" placeholder="8 caractères minimum" autocomplete="new-password"/></div>
    <div><label>Confirme le mot de passe</label><input type="password" id="new-pwd-confirm" placeholder="••••••••" autocomplete="new-password"/></div>
    <button class="btn" onclick="updatePwd()" id="update-btn">Mettre à jour le mot de passe</button>
    <div class="msg" id="reset-msg"></div>
  </div>
  <div id="invalid-step" style="display:none">
    <h2>Lien expiré ou invalide</h2>
    <p class="intro">Ce lien de réinitialisation n'est plus valide. Demande un nouveau lien depuis la page de connexion.</p>
    <a href="/espace-membre/login.html" class="btn-sec">← Retour à la connexion</a>
  </div>
</div>
<a href="https://vyrashop.com" class="back">← Retour à VyraShop</a>
<script>
const SUPABASE_URL='https://pdprwoskbrsoojtanmze.supabase.co';const SUPABASE_ANON_KEY='sb_publishable_8bOARWbOH9NbbsYbtoaJ8Q_z59Eht4f';const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
var recoveryReady=false;
sb.auth.onAuthStateChange(function(event,session){if(event==='PASSWORD_RECOVERY'){recoveryReady=true;}});
sb.auth.getSession().then(function(res){var session=res.data&&res.data.session;if(session){recoveryReady=true;}});
setTimeout(function(){if(!recoveryReady){sb.auth.getSession().then(function(res){var session=res.data&&res.data.session;if(!session){document.getElementById('form-step').style.display='none';document.getElementById('invalid-step').style.display='block';}});}},2500);
function showMsg(type,text){var el=document.getElementById('reset-msg');el.className='msg '+type;el.textContent=text;el.style.display='block';}
async function updatePwd(){
  var btn=document.getElementById('update-btn');var pwd=document.getElementById('new-pwd').value;var confirm=document.getElementById('new-pwd-confirm').value;
  if(!pwd||!confirm){showMsg('error','Remplis les deux champs.');return;}
  if(pwd.length<8){showMsg('error','Mot de passe trop court (8 caractères minimum).');return;}
  if(pwd!==confirm){showMsg('error','Les deux mots de passe ne correspondent pas.');return;}
  btn.disabled=true;btn.textContent='Mise à jour…';
  var {error}=await sb.auth.updateUser({password:pwd});
  if(error){showMsg('error',error.message||'Erreur lors de la mise à jour. Réessaie ou demande un nouveau lien.');btn.disabled=false;btn.textContent='Mettre à jour le mot de passe';return;}
  showMsg('success','Mot de passe mis à jour ! Redirection…');setTimeout(function(){window.location.href='/espace-membre/';},1500);
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')updatePwd();});
</script>
</body>
</html>
