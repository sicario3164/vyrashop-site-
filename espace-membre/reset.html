<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nouveau mot de passe — VyraShop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b14;--card:#1e1733;--bord:rgba(167,139,250,.22);--pu:#8a5cf6;--pl:#c4b5fd;--or:#fb923c;--wh:#fff;--tx:#e2d9f3;--gr:#4ade80;--red:#f87171}
body{background:var(--bg);color:var(--wh);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:1.4rem;font-weight:900;margin-bottom:32px;text-decoration:none;}
.card{background:var(--card);border:1px solid var(--bord);border-radius:20px;padding:36px 28px;width:100%;max-width:420px}
.card h2{font-size:1.15rem;font-weight:800;margin-bottom:8px}
.card p.intro{color:var(--tx);font-size:.85rem;margin-bottom:24px}
label{display:block;font-size:.8rem;font-weight:700;color:var(--tx);margin-bottom:6px}
input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--bord);background:rgba(255,255,255,.05);color:var(--wh);font-size:.95rem;font-family:inherit;margin-bottom:16px;outline:none;transition:border .2s}
input:focus{border-color:var(--pu)}
.btn{width:100%;background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff;border:none;padding:15px;border-radius:50px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{display:inline-block;width:100%;text-align:center;background:transparent;color:var(--tx);border:1px solid var(--bord);padding:14px;border-radius:50px;font-size:.92rem;font-weight:700;text-decoration:none;margin-top:10px}
.msg{font-size:.82rem;padding:12px 16px;border-radius:10px;margin-top:16px;display:none}
.msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--gr)}
.back{display:block;text-align:center;margin-top:24px;color:var(--tx);font-size:.8rem;text-decoration:none}
.back:hover{color:var(--wh)}

/* VyraShop brand purple gradient */
.logo-vyra,.logo,.brand-vyra{
  background:linear-gradient(100deg,#8a5cf6 0%,#c4b5fd 55%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
</style>
</head>
<body>
<a href="/" class="logo"><span class="logo-vyra">VyraShop</span></a>

<div class="card">
  <div id="form-step">
    <h2>Choisis un nouveau mot de passe</h2>
    <p class="intro">Ce lien provient de l'email de réinitialisation que tu viens de recevoir.</p>
    <div>
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-pwd" placeholder="8 caractères minimum" autocomplete="new-password"/>
    </div>
    <div>
      <label>Confirme le mot de passe</label>
      <input type="password" id="new-pwd-confirm" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <button class="btn" onclick="updatePwd()" id="update-btn">Mettre à jour le mot de passe</button>
    <div class="msg" id="reset-msg"></div>
  </div>

  <div id="invalid-step" style="display:none">
    <h2>Lien expiré ou invalide</h2>
    <p class="intro">Ce lien de réinitialisation n'est plus valide. Demande un nouveau lien depuis la page de connexion.</p>
    <a href="/espace-membre/login.html" class="btn-sec">← Retour à la connexion</a>
  </div>
</div>

<a href="https://vyrashop.com" class="back">← Retour à VyraShop</a>

<script>
const SUPABASE_URL='https://pdprwoskbrsoojtanmze.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_8bOARWbOH9NbbsYbtoaJ8Q_z59Eht4f';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

var recoveryReady=false;

sb.auth.onAuthStateChange(function(event,session){
  if(event==='PASSWORD_RECOVERY'){recoveryReady=true;}
});

// Si le lien a déjà été consommé / session déjà active via recovery au chargement
sb.auth.getSession().then(function(res){
  var session=res.data&&res.data.session;
  if(session){recoveryReady=true;}
});

setTimeout(function(){
  if(!recoveryReady){
    sb.auth.getSession().then(function(res){
      var session=res.data&&res.data.session;
      if(!session){
        document.getElementById('form-step').style.display='none';
        document.getElementById('invalid-step').style.display='block';
      }
    });
  }
},2500);

function showMsg(type,text){
  var el=document.getElementById('reset-msg');
  el.className='msg '+type;
  el.textContent=text;
  el.style.display='block';
}

async function updatePwd(){
  var btn=document.getElementById('update-btn');
  var pwd=document.getElementById('new-pwd').value;
  var confirm=document.getElementById('new-pwd-confirm').value;
  if(!pwd||!confirm){showMsg('error','Remplis les deux champs.');return;}
  if(pwd.length<8){showMsg('error','Mot de passe trop court (8 caractères minimum).');return;}
  if(pwd!==confirm){showMsg('error','Les deux mots de passe ne correspondent pas.');return;}
  btn.disabled=true;btn.textContent='Mise à jour…';
  var {error}=await sb.auth.updateUser({password:pwd});
  if(error){
    showMsg('error',error.message||'Erreur lors de la mise à jour. Réessaie ou demande un nouveau lien.');
    btn.disabled=false;btn.textContent='Mettre à jour le mot de passe';
    return;
  }
  showMsg('success','Mot de passe mis à jour ! Redirection…');
  setTimeout(function(){window.location.href='/espace-membre/';},1500);
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')updatePwd();});
</script>
</body>
</html>
