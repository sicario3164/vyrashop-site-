<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Espace Membre — VyraShop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060412;--card:#0d0b1f;
  --pu:#7c3aed;--pu-light:#8b5cf6;--pl:#c4b5fd;
  --cy:#22d3ee;--cy-light:#67e8f9;--pk:#e879f9;--pk-light:#f0abfc;
  --or:#f97316;--gr:#34d399;--red:#f87171;
  --wh:#fff;--tx:#8b7cb4;--tx-bright:#cdc3ea;
  --bord:rgba(139,92,246,.09);--bord-mid:rgba(139,92,246,.22);
  --r:14px;--r-lg:20px;--r-xl:28px;--r-pill:9999px;
}
html{height:100%}
body{
  background:
    radial-gradient(ellipse 700px 500px at 20% -10%,rgba(124,58,237,.12),transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 10%,rgba(34,211,238,.07),transparent 55%),
    radial-gradient(ellipse 400px 400px at 10% 80%,rgba(232,121,249,.05),transparent 60%),
    var(--bg);
  color:var(--wh);
  font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.page-wrap{width:100%;max-width:430px}
.logo-link{display:block;text-align:center;margin-bottom:36px;text-decoration:none;font-size:1.6rem;font-weight:900}
.logo-vyra{background:linear-gradient(100deg,#c4b5fd 0%,#8b5cf6 40%,#22d3ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card{
  background:var(--card);
  border:1px solid transparent;
  background-clip:padding-box;
  outline:1px solid rgba(139,92,246,.2);
  border-radius:var(--r-xl);padding:36px 32px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 80px rgba(124,58,237,.08);
}
.tabs{display:flex;gap:0;margin-bottom:28px;background:rgba(0,0,0,.35);border-radius:12px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;font-size:.87rem;font-weight:700;cursor:pointer;border-radius:9px;color:var(--tx);transition:all .22s cubic-bezier(.4,0,.2,1)}
.tab.active{background:var(--card);color:var(--wh);box-shadow:0 2px 12px rgba(0,0,0,.5)}
.form-section{display:none}
.form-section.active{display:block}
.form-label{display:block;font-size:.77rem;font-weight:700;color:var(--cy-light);margin-bottom:7px;letter-spacing:.3px}
.form-input{width:100%;padding:13px 16px;border-radius:var(--r);border:1.5px solid var(--bord-mid);background:rgba(255,255,255,.04);color:var(--wh);font-size:.95rem;font-family:inherit;margin-bottom:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
.form-input::placeholder{color:rgba(196,181,253,.22)}
.btn{width:100%;background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff;border:none;padding:15px;border-radius:var(--r-pill);font-size:.97rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .22s;box-shadow:0 4px 20px rgba(124,58,237,.38)}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(124,58,237,.58)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.msg{font-size:.83rem;padding:12px 16px;border-radius:var(--r);margin-top:16px;display:none;line-height:1.5}
.msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.msg.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--gr)}
.forgot{text-align:center;margin-top:14px;font-size:.8rem;color:var(--tx)}
.forgot a{color:var(--cy-light);text-decoration:none;transition:color .15s}
.forgot a:hover{color:var(--wh)}
.consent-box{display:flex;align-items:flex-start;gap:10px;margin:8px 0 16px;cursor:pointer;padding:11px 13px;background:rgba(139,92,246,.05);border:1px solid var(--bord);border-radius:var(--r);transition:border-color .2s}
.consent-box:hover{border-color:var(--bord-mid)}
.consent-box input{margin-top:2px;flex-shrink:0;width:15px;height:15px;accent-color:var(--cy);cursor:pointer}
.consent-box span{font-size:.78rem;color:rgba(196,181,253,.45);line-height:1.5}
.consent-box span a{color:rgba(249,115,22,.75);text-decoration:underline}
.form-sub{color:var(--tx);font-size:.84rem;margin-bottom:20px;line-height:1.55}
.mfa-info{color:var(--tx-bright);font-size:.85rem;margin-bottom:18px;line-height:1.55;background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.2);border-radius:var(--r);padding:13px 16px}
.back-link{display:block;text-align:center;margin-top:24px;color:var(--tx);font-size:.8rem;text-decoration:none;transition:color .15s}
.back-link:hover{color:var(--wh)}
</style>
</head>
<body>
<div class="page-wrap">
  <a href="/" class="logo-link"><span class="logo-vyra">VyraShop</span></a>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Connexion</div>
      <div class="tab" onclick="switchTab('register')">Créer un compte</div>
    </div>
    <!-- LOGIN -->
    <div class="form-section active" id="login-form">
      <div id="login-form-inner">
        <div>
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="ton@email.com" autocomplete="email"/>
        </div>
        <div>
          <label class="form-label">Mot de passe</label>
          <input type="password" id="login-pwd" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn" onclick="login()" id="login-btn">Se connecter</button>
        <div class="forgot"><a href="#" onclick="resetPassword()">Mot de passe oublié ?</a></div>
      </div>
      <!-- MFA Challenge -->
      <div id="mfa-challenge" style="display:none">
        <div class="mfa-info">🔐 Entre le code à 6 chiffres de ton application d'authentification.</div>
        <div>
          <label class="form-label">Code de vérification</label>
          <input type="text" id="mfa-code-input" class="form-input" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code" onkeydown="if(event.key==='Enter')verifyMFA()"/>
        </div>
        <button class="btn" onclick="verifyMFA()" id="mfa-verify-btn">Valider</button>
        <div class="msg" id="mfa-msg"></div>
      </div>
      <div class="msg" id="login-msg"></div>
    </div>
    <!-- REGISTER -->
    <div class="form-section" id="register-form">
      <p class="form-sub">Crée ton compte avec l'email utilisé lors de ton achat.</p>
      <div>
        <label class="form-label">Prénom</label>
        <input type="text" id="reg-name" class="form-input" placeholder="Ton prénom"/>
      </div>
      <div>
        <label class="form-label">Email (celui de ton achat)</label>
        <input type="email" id="reg-email" class="form-input" placeholder="ton@email.com" autocomplete="email"/>
      </div>
      <div>
        <label class="form-label">Mot de passe</label>
        <input type="password" id="reg-pwd" class="form-input" placeholder="8 caractères minimum" autocomplete="new-password"/>
      </div>
      <label for="reg-cgv" class="consent-box">
        <input type="checkbox" id="reg-cgv" style="margin-top:2px;flex-shrink:0;width:15px;height:15px;accent-color:#22d3ee;cursor:pointer"/>
        <span>J'accepte les <a href="https://vyrashop.com/cgv.html" target="_blank" rel="noopener">CGV</a> et la <a href="https://vyrashop.com/politique-confidentialite.html" target="_blank" rel="noopener">politique de confidentialité</a></span>
      </label>
      <button class="btn" onclick="register()" id="reg-btn">Créer mon compte</button>
      <div class="msg" id="reg-msg"></div>
    </div>
  </div>
  <a href="https://vyrashop.com" class="back-link">← Retour à VyraShop</a>
</div>
<script>
const SUPABASE_URL = 'https://pdprwoskbrsoojtanmze.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8bOARWbOH9NbbsYbtoaJ8Q_z59Eht4f';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='/espace-membre/';
});
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('active',tab==='login');
  document.getElementById('register-form').classList.toggle('active',tab==='register');
}
function showMsg(id,type,text){
  var el=document.getElementById(id);
  el.className='msg '+type;el.textContent=text;el.style.display='block';
}
async function login(){
  var btn=document.getElementById('login-btn');
  var email=document.getElementById('login-email').value.trim();
  var pwd=document.getElementById('login-pwd').value;
  if(!email||!pwd){showMsg('login-msg','error','Remplis tous les champs.');return;}
  btn.disabled=true;btn.textContent='Connexion…';
  var {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){showMsg('login-msg','error','Email ou mot de passe incorrect.');btn.disabled=false;btn.textContent='Se connecter';return;}
  if(data.session===null&&data.user===null){
    var factors=await sb.auth.mfa.listFactors();
    var totpFactor=factors.data&&factors.data.totp&&factors.data.totp[0];
    if(totpFactor){
      var {data:challengeData}=await sb.auth.mfa.challenge({factorId:totpFactor.id});
      if(challengeData){
        document.getElementById('mfa-challenge').style.display='block';
        document.getElementById('login-form-inner').style.display='none';
        window._mfaFactorId=totpFactor.id;window._mfaChallengeId=challengeData.id;
        document.getElementById('mfa-code-input').focus();btn.disabled=false;btn.textContent='Se connecter';return;
      }
    }
  }
  window.location.href='/espace-membre/';
}
async function verifyMFA(){
  var code=document.getElementById('mfa-code-input').value.trim();
  if(!code||code.length!==6){showMsg('mfa-msg','error','Entre un code à 6 chiffres.');return;}
  var btn=document.getElementById('mfa-verify-btn');
  btn.disabled=true;btn.textContent='Vérification…';
  var {error}=await sb.auth.mfa.verify({factorId:window._mfaFactorId,challengeId:window._mfaChallengeId,code:code});
  if(error){showMsg('mfa-msg','error','Code incorrect ou expiré. Réessaie.');btn.disabled=false;btn.textContent='Valider';}
  else{window.location.href='/espace-membre/';}
}
async function register(){
  var btn=document.getElementById('reg-btn');
  var name=document.getElementById('reg-name').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var pwd=document.getElementById('reg-pwd').value;
  if(!name||!email||!pwd){showMsg('reg-msg','error','Remplis tous les champs.');return;}
  if(pwd.length<8){showMsg('reg-msg','error','Mot de passe trop court (8 caractères minimum).');return;}
  if(!document.getElementById('reg-cgv').checked){showMsg('reg-msg','error','Tu dois accepter les CGV et la politique de confidentialité.');return;}
  btn.disabled=true;btn.textContent='Création…';
  var {error}=await sb.auth.signUp({email,password:pwd,options:{data:{full_name:name}}});
  if(error){showMsg('reg-msg','error',error.message);btn.disabled=false;btn.textContent='Créer mon compte';}
  else showMsg('reg-msg','success','Compte créé ! Vérifie ta boîte email pour confirmer, puis connecte-toi.');
  btn.disabled=false;btn.textContent='Créer mon compte';
}
async function resetPassword(){
  var email=document.getElementById('login-email').value.trim();
  if(!email){showMsg('login-msg','error','Entre ton email d\'abord.');return;}
  await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://vyrashop.com/espace-membre/reset.html'});
  showMsg('login-msg','success','Email de réinitialisation envoyé !');
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'){var active=document.querySelector('.form-section.active');if(active.id==='login-form')login();else register();}});
</script>
</body>
</html>
