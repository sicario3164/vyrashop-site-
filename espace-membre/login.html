<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Espace Membre — VyraShop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b14;--card:#1e1733;--bord:rgba(167,139,250,.22);--pu:#8a5cf6;--pl:#c4b5fd;--or:#fb923c;--wh:#fff;--tx:#e2d9f3;--gr:#4ade80;--red:#f87171}
body{background:var(--bg);color:var(--wh);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:1.4rem;font-weight:900;margin-bottom:32px;text-decoration:none;}

.card{background:var(--card);border:1px solid var(--bord);border-radius:20px;padding:36px 28px;width:100%;max-width:420px}
.tabs{display:flex;gap:0;margin-bottom:28px;background:rgba(0,0,0,.3);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;font-size:.88rem;font-weight:700;cursor:pointer;border-radius:8px;color:var(--tx);transition:all .2s}
.tab.active{background:var(--card);color:var(--wh);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.form-section{display:none}
.form-section.active{display:block}
label{display:block;font-size:.8rem;font-weight:700;color:var(--tx);margin-bottom:6px}
input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--bord);background:rgba(255,255,255,.05);color:var(--wh);font-size:.95rem;font-family:inherit;margin-bottom:16px;outline:none;transition:border .2s}
input:focus{border-color:var(--pu)}
.btn{width:100%;background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff;border:none;padding:15px;border-radius:50px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:.82rem;padding:12px 16px;border-radius:10px;margin-top:16px;display:none}
.msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--gr)}
.forgot{text-align:center;margin-top:14px;font-size:.8rem;color:var(--tx)}
.forgot a{color:var(--pl);text-decoration:none}
.divider{text-align:center;color:var(--tx);font-size:.8rem;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bord)}
.divider::before{left:0}.divider::after{right:0}
.back{display:block;text-align:center;margin-top:24px;color:var(--tx);font-size:.8rem;text-decoration:none}
.back:hover{color:var(--wh)}

/* VyraShop brand purple gradient */
.logo-vyra,.logo,.brand-vyra{
  background:linear-gradient(100deg,#8a5cf6 0%,#c4b5fd 55%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
</style>
</head>
<body>
<a href="/" class="logo"><span class="logo-vyra">VyraShop</span></a>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Connexion</div>
    <div class="tab" onclick="switchTab('register')">Créer un compte</div>
  </div>

  <!-- LOGIN -->
  <div class="form-section active" id="login-form">
    <div id="login-form-inner">
      <div>
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email"/>
      </div>
      <div>
        <label>Mot de passe</label>
        <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" onclick="login()" id="login-btn">Se connecter</button>
      <div class="forgot"><a href="#" onclick="resetPassword()">Mot de passe oublié ?</a></div>
    </div>

    <!-- Challenge MFA — affiché uniquement si le compte a la 2FA activée -->
    <div id="mfa-challenge" style="display:none">
      <p style="color:var(--tx);font-size:.85rem;margin-bottom:16px">🔐 Entre le code à 6 chiffres de ton application d'authentification.</p>
      <div>
        <label>Code de vérification</label>
        <input type="text" id="mfa-code-input" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code" onkeydown="if(event.key==='Enter')verifyMFA()"/>
      </div>
      <button class="btn" onclick="verifyMFA()" id="mfa-verify-btn">Valider</button>
      <div class="msg" id="mfa-msg"></div>
    </div>

    <div class="msg" id="login-msg"></div>
  </div>

  <!-- REGISTER -->
  <div class="form-section" id="register-form">
    <p style="color:var(--tx);font-size:.85rem;margin-bottom:20px">Crée ton compte avec l'email utilisé lors de ton achat.</p>
    <div>
      <label>Prénom</label>
      <input type="text" id="reg-name" placeholder="Ton prénom"/>
    </div>
    <div>
      <label>Email (celui de ton achat)</label>
      <input type="email" id="reg-email" placeholder="ton@email.com" autocomplete="email"/>
    </div>
    <div>
      <label>Mot de passe</label>
      <input type="password" id="reg-pwd" placeholder="8 caractères minimum" autocomplete="new-password"/>
    </div>
    <label for="reg-cgv" style="display:flex;align-items:flex-start;gap:10px;margin:8px 0;cursor:pointer;padding:10px 12px;background:rgba(138,92,246,.07);border:1px solid rgba(138,92,246,.2);border-radius:10px">
      <input type="checkbox" id="reg-cgv" style="margin-top:2px;flex-shrink:0;width:16px;height:16px;accent-color:#8a5cf6;cursor:pointer"/>
      <span style="font-size:.82rem;font-weight:400;color:#c4b5fd;line-height:1.5">J'accepte les <a href="https://vyrashop.com/cgv.html" target="_blank" rel="noopener" style="color:#fb923c">CGV</a> et la <a href="https://vyrashop.com/politique-confidentialite.html" target="_blank" rel="noopener" style="color:#fb923c">politique de confidentialité</a></span>
    </label>
    <button class="btn" onclick="register()" id="reg-btn">Créer mon compte</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>

<a href="https://vyrashop.com" class="back">← Retour à VyraShop</a>

<script>
const SUPABASE_URL = 'https://pdprwoskbrsoojtanmze.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8bOARWbOH9NbbsYbtoaJ8Q_z59Eht4f';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect si déjà connecté
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='/espace-membre/';
});

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('active',tab==='login');
  document.getElementById('register-form').classList.toggle('active',tab==='register');
}

function showMsg(id,type,text){
  var el=document.getElementById(id);
  el.className='msg '+type;
  el.textContent=text;
  el.style.display='block';
}

async function login(){
  var btn=document.getElementById('login-btn');
  var email=document.getElementById('login-email').value.trim();
  var pwd=document.getElementById('login-pwd').value;
  if(!email||!pwd){showMsg('login-msg','error','Remplis tous les champs.');return;}
  btn.disabled=true;btn.textContent='Connexion…';
  var {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){
    showMsg('login-msg','error','Email ou mot de passe incorrect.');
    btn.disabled=false;btn.textContent='Se connecter';
    return;
  }
  // MFA : si le compte a le 2FA activé, Supabase renvoie un challenge à résoudre
  if(data.session===null && data.user===null){
    // L'auth est à l'état 'authenticating' — challenge MFA requis
    var factors=await sb.auth.mfa.listFactors();
    var totpFactor=factors.data&&factors.data.totp&&factors.data.totp[0];
    if(totpFactor){
      var {data:challengeData}=await sb.auth.mfa.challenge({factorId:totpFactor.id});
      if(challengeData){
        // Afficher le formulaire de saisie du code MFA
        document.getElementById('mfa-challenge').style.display='block';
        document.getElementById('login-form-inner').style.display='none';
        window._mfaFactorId=totpFactor.id;
        window._mfaChallengeId=challengeData.id;
        document.getElementById('mfa-code-input').focus();
        btn.disabled=false;btn.textContent='Se connecter';
        return;
      }
    }
  }
  window.location.href='/espace-membre/';
}

async function verifyMFA(){
  var code=document.getElementById('mfa-code-input').value.trim();
  if(!code||code.length!==6){showMsg('mfa-msg','error','Entre un code à 6 chiffres.');return;}
  var btn=document.getElementById('mfa-verify-btn');
  btn.disabled=true;btn.textContent='Vérification…';
  var {error}=await sb.auth.mfa.verify({
    factorId:window._mfaFactorId,
    challengeId:window._mfaChallengeId,
    code:code
  });
  if(error){
    showMsg('mfa-msg','error','Code incorrect ou expiré. Réessaie.');
    btn.disabled=false;btn.textContent='Valider';
  } else {
    window.location.href='/espace-membre/';
  }
}

async function register(){
  var btn=document.getElementById('reg-btn');
  var name=document.getElementById('reg-name').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var pwd=document.getElementById('reg-pwd').value;
  if(!name||!email||!pwd){showMsg('reg-msg','error','Remplis tous les champs.');return;}
  if(pwd.length<8){showMsg('reg-msg','error','Mot de passe trop court (8 caractères minimum).');return;}
  if(!document.getElementById('reg-cgv').checked){showMsg('reg-msg','error','Tu dois accepter les CGV et la politique de confidentialité.');return;}
  btn.disabled=true;btn.textContent='Création…';
  var {error}=await sb.auth.signUp({email,password:pwd,options:{data:{full_name:name}}});
  if(error){showMsg('reg-msg','error',error.message);btn.disabled=false;btn.textContent='Créer mon compte';}
  else showMsg('reg-msg','success','Compte créé ! Vérifie ta boîte email pour confirmer, puis connecte-toi.');
  btn.disabled=false;btn.textContent='Créer mon compte';
}

async function resetPassword(){
  var email=document.getElementById('login-email').value.trim();
  if(!email){showMsg('login-msg','error','Entre ton email d\'abord.');return;}
  await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://vyrashop.com/espace-membre/reset.html'});
  showMsg('login-msg','success','Email de réinitialisation envoyé !');
}

document.addEventListener('keydown',function(e){if(e.key==='Enter'){var active=document.querySelector('.form-section.active');if(active.id==='login-form')login();else register();}});
</script>
</body>
</html>
